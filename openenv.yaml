# OpenEnv Configuration — Email Rectifier Assistant
# This file defines the OpenEnv-compatible environment for the AI email agent.

name: email-rectifier-openenv
version: "2.0.0"
description: >
  OpenEnv-compatible environment for AI-driven email classification,
  prioritization, and decision-making. The agent processes inbox emails
  and takes actions (FYI, ACT_NOW, NEEDS_REPLY, IGNORE, DELETE, BLOCK)
  based on category, priority, and fraud detection.

# ── Environment Specification ────────────────────────────────────────────────

environment:
  type: email_decision_agent
  module: openenv_agent.EmailEnv

  # State space: what the agent observes
  observation_space:
    session_id: string
    inbox:
      total: int
      processed: int
      remaining: int
      progress_pct: float
    current_email:
      id: string
      sender: string
      subject: string
      category: string
      priority_score: int
      is_fraud: bool
      fraud_probability: float
      suggested_action: string
      summary: string
      custom_label: string
      sender_importance: bool
    preferences:
      life_mode: string
      fraud_sensitivity: string
      focus_mode: bool
    stats:
      total_reward: float
      avg_reward: float
      categories_processed: dict

  # Action space: what the agent can do
  action_space:
    type: discrete
    actions:
      - FYI         # Mark as informational
      - ACT_NOW     # Requires immediate action
      - NEEDS_REPLY # Needs a response
      - IGNORE      # Safe to ignore
      - DELETE       # Delete email
      - BLOCK        # Block sender

  # Reward specification
  reward:
    type: float
    range: [-5.0, 15.0]
    components:
      - name: category_classified
        weight: 2.0
        description: "Reward for processing a classified email"
      - name: action_match
        weight: 3.0
        description: "Reward when action matches ideal for category"
      - name: fraud_handling
        weight: 5.0
        description: "Reward for correct fraud detection action"
      - name: preference_alignment
        weight: 2.0
        description: "Reward for aligning with user priorities"
      - name: task_extraction
        weight: 1.0
        description: "Bonus per extracted task (max 3)"
      - name: summary_quality
        weight: 1.0
        description: "Bonus for quality summary"
      - name: ignore_penalty
        weight: -2.0
        description: "Penalty for ignoring high-priority emails"

# ── API Server Configuration ─────────────────────────────────────────────────

api:
  framework: fastapi
  entrypoint: api_server:app
  port: 7860
  endpoints:
    reset:
      method: POST
      path: /reset
      description: "Reset the environment with email list + preferences"
    step:
      method: POST
      path: /step
      description: "Apply an action to the current email"
      request_body:
        action: string  # One of the action space values
    state:
      method: GET
      path: /state
      description: "Get the current environment state"

# ── Evaluation Tasks ─────────────────────────────────────────────────────────

tasks:
  - name: email_classification
    description: "Classify emails into 14 categories"
    grader: graders.classification_grader.ClassificationGrader
    samples: 14

  - name: reply_generation
    description: "Generate appropriate email replies"
    grader: graders.reply_grader.ReplyGrader
    samples: 5

  - name: summarization
    description: "Summarize emails concisely"
    grader: graders.summarization_grader.SummarizationGrader
    samples: 6

# ── Inference Configuration ──────────────────────────────────────────────────

inference:
  script: inference.py
  runtime: "<20 minutes on 2 vCPU, 8GB RAM"
  environment_variables:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
  output_format:
    start: "[START]"
    step: "[STEP]"
    end: "[END]"

# ── Docker Configuration ─────────────────────────────────────────────────────

docker:
  dockerfile: Dockerfile
  base_image: python:3.10-slim
  port: 7860
